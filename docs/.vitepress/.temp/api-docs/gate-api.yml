openapi: 3.0.1
x-stoplight:
  id: n7f80q7qbdce3
info:
  title: Host-to-host API
  description: "Server-to-server API for merchants that need direct control over payment creation, callbacks, refunds, payouts, and payment status checks.\r\n\r\n**Base URL**\r\n\r\n`https://api.platform.dev`\r\n\r\n**You need before start**\r\n\r\n- `project_id`\r\n- `secret_key`\r\n- backend callback URL\r\n- server-side signature generation\r\n\r\n**Start here**\r\n\r\n- [Quickstart](/gate/gate-quickstart)\r\n- [Basic implementation](/gate/gate-quickstart-basic-implementation)\r\n- [Signature generation](/gate/signature-gate)\r\n\r\n**First endpoint to try**\r\n\r\n`POST /v2/payment/card/sale`\r\n\r\n**Important rule**\r\n\r\nBuild the full payload first, generate `general.signature` last, and treat callbacks as the source of the final payment result."
  version: 3.28.0
servers:
  - url: 'https://api.<host_name>'
paths:
  /v2/payment/card/sale:
    post:
      tags:
        - Card payments
      summary: /v2/payment/card/sale
      description: Request for purchase from the customer's card
      operationId: POST_v2-payment-card-sale
      requestBody:
        content:
          application/json:
            schema:
              required:
                - general
                - card
                - customer
                - payment
              type: object
              properties:
                general:
                  $ref: '#/components/schemas/GeneralInfo'
                card:
                  $ref: '#/components/schemas/CardInfoForSaleAuth'
                customer:
                  $ref: '#/components/schemas/CustomerInfoCard'
                merchant:
                  $ref: '#/components/schemas/MerchantInfo'
                avs_data:
                  $ref: '#/components/schemas/AvsInfo'
                payment:
                  $ref: '#/components/schemas/PaymentInfoForCard'
                return_url:
                  $ref: '#/components/schemas/ReturnUrl'
                cash_voucher_data:
                  $ref: '#/components/schemas/CashVoucherData'
                recurring:
                  $ref: '#/components/schemas/RecurringInfo'
                receipt_data:
                  $ref: '#/components/schemas/ReceiptData'
                callback:
                  $ref: '#/components/schemas/CallbackInfo'
                addendum:
                  $ref: '#/components/schemas/AddendumInitial'
                acs_return_url:
                  $ref: '#/components/schemas/ACSReturnUrl'
                authentication_data:
                  $ref: '#/components/schemas/AuthenticationData'
            examples: {}
        required: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateSuccessResponse'
        '400':
          description: Data validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid data structure or JSON parsing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
